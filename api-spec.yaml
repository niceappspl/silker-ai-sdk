openapi: 3.0.0
info:
  title: Silker AI Cloud API
  description: API specification for Silker AI cloud backend communication
  version: 0.1.0

servers:
  - url: https://silker.cloudflareworkers.com/api
    description: Production server

paths:
  /api:
    post:
      summary: Send security event for analysis
      description: Sends a sanitized security event to the cloud backend for AI-powered threat analysis
      operationId: analyzeEvent
      tags:
        - Security
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SilkerEvent'
            examples:
              httpRequest:
                summary: HTTP Request Event
                value:
                  method: "POST"
                  url: "/api/users"
                  payload: "{\"email\":\"user@example.com\"}"
                  ip: "192.168.1.1"
                  timestamp: 1234567890
                  userAgent: "Mozilla/5.0..."
                  headers:
                    content-type: "application/json"
      responses:
        '200':
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloudResponse'
              examples:
                block:
                  summary: Block request
                  value:
                    block: true
                    severity: "high"
                    alertId: "alert-123"
                    fixSnippet: "Use parameterized queries"
                allow:
                  summary: Allow request
                  value:
                    block: false
                    severity: "low"
        '401':
          description: Unauthorized - Invalid API key
        '429':
          description: Rate limit exceeded
        '500':
          description: Server error

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SilkerEvent:
      type: object
      required:
        - method
        - url
        - timestamp
      properties:
        method:
          type: string
          description: HTTP method
          enum: [GET, POST, PUT, PATCH, DELETE, OPTIONS, HEAD]
        url:
          type: string
          description: Request URL path
          example: "/api/users/123"
        payload:
          oneOf:
            - type: string
            - type: object
          description: Request payload (sanitized)
          example: "{\"email\":\"user@example.com\"}"
        ip:
          type: string
          description: Client IP address
          example: "192.168.1.1"
        timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds
          example: 1234567890
        userAgent:
          type: string
          description: User-Agent header
          example: "Mozilla/5.0..."
        headers:
          type: object
          additionalProperties:
            type: string
          description: HTTP headers (sanitized)
          example:
            content-type: "application/json"
            authorization: "Bearer ***MASKED***"

    CloudResponse:
      type: object
      required:
        - block
      properties:
        block:
          type: boolean
          description: Whether to block the request
        fixSnippet:
          type: string
          description: AI-generated fix suggestion
          example: "Use parameterized queries: SELECT * FROM users WHERE id = ?"
        severity:
          type: string
          enum: [low, medium, high]
          description: Threat severity level
        alertId:
          type: string
          description: Unique alert identifier
          example: "alert-123"

